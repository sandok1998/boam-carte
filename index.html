<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AO par département</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height:100%; margin:0; }
    #map { height:100vh; }

    .info, .legend{
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
      font: 14px/1.3 system-ui, -apple-system, Segoe UI, Arial;
    }
    .legend { font-size: 12px; }
    .legend i {
      width: 14px;
      height: 14px;
      float: left;
      margin-right: 8px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1) Vos chiffres AO par département
    const ao = {
      "33": 23265, "40": 2162, "64": 1652, "24": 1572, "17": 1508, "47": 1425,
      "75": 1149, "31": 1113, "16": 1110, "86": 818,  "87": 715,  "19": 575,
      "13": 522,  "32": 486,  "79": 482,  "69": 469,  "65": 417,  "23": 293,
      "34": 271,  "44": 247,  "92": 242,  "59": 238,  "46": 208,  "83": 200,
      "81": 196,  "82": 188,  "12": 182,  "85": 181,  "35": 171,  "09": 171,
      "66": 166,  "94": 155,  "29": 141,  "67": 132,  "93": 123,  "91": 116,
      "57": 115,  "49": 108,  "78": 108,  "63": 104,  "06": 94,   "56": 86,
      "45": 80,   "77": 80,   "11": 72,   "30": 72,   "76": 63,   "54": 59,
      "51": 49,   "37": 42,   "95": 42,   "62": 40,   "38": 39,   "71": 36,
      "01": 33,   "84": 29,   "36": 28,   "18": 26,   "21": 25,   "68": 24,
      "04": 23,   "22": 22,   "03": 22,   "15": 21,   "27": 21,   "60": 21,
      "41": 18,   "52": 17,   "73": 16,   "80": 16,   "25": 15,   "14": 14,
      "72": 14,   "02": 13,   "50": 13,   "05": 12,   "43": 12,   "42": 11,
      "53": 11,   "90": 11,   "74": 9,    "89": 9,    "48": 8,    "26": 7,
      "70": 7,    "28": 6,    "61": 5,    "55": 4,    "58": 3,    "10": 2,

      // Corse : souvent "2A" / "2B"
      "2A": 13, "2B": 12
    };

    // 2) Carte
    const map = L.map("map").setView([46.6, 2.5], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // Helpers pour lire les propriétés quelle que soit la source
    function getDeptCode(props){
      return props.code || props.CODE || props.code_departement || props.codeDepartement || props.dep || props.DEP;
    }
    function getDeptName(props){
      return props.nom || props.NOM || props.name || props.libelle || "Département";
    }

    // 3) Boîte d’info
    const info = L.control({ position: "topright" });
    info.onAdd = function() {
      this._div = L.DomUtil.create("div", "info");
      this.update();
      return this._div;
    };
    info.update = function(props) {
      if (!props) {
        this._div.innerHTML = "<b>Appels d'offres par département</b><br>Survolez un département";
        return;
      }
      const code = getDeptCode(props);
      const nom  = getDeptName(props);
      const n = ao[code] || 0;
      this._div.innerHTML = `<b>${nom} (${code})</b><br>${n.toLocaleString("fr-FR")} AO`;
    };
    info.addTo(map);

    // 4) Couleurs
    function getColor(n) {
      return n > 10000 ? "#800026" :
             n > 3000  ? "#BD0026" :
             n > 1000  ? "#E31A1C" :
             n > 300   ? "#FC4E2A" :
             n > 100   ? "#FD8D3C" :
             n > 0     ? "#FEB24C" :
                         "#EEE";
    }

    function style(feature) {
      const code = getDeptCode(feature.properties) || "";
      const n = ao[code] || 0;
      return {
        weight: 1,
        color: "#333",
        fillOpacity: 0.7,
        fillColor: getColor(n)
      };
    }

    // 5) Interactions
    let geoLayer;

    function highlight(e) {
      const layer = e.target;
      layer.setStyle({ weight: 2, color: "#000", fillOpacity: 0.85 });
      layer.bringToFront();
      info.update(layer.feature.properties);
    }

    function reset(e) {
      geoLayer.resetStyle(e.target);
      info.update();
    }

    function onEachFeature(feature, layer) {
      layer.on({ mouseover: highlight, mouseout: reset });

      const props = feature.properties || {};
      const code = getDeptCode(props);
      const nom  = getDeptName(props);
      const n = ao[code] || 0;
      layer.bindTooltip(`${nom} (${code}) : ${n.toLocaleString("fr-FR")} AO`, { sticky: true });
    }

    // 6) Légende
    const legend = L.control({ position: "bottomright" });
    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");
      const grades = [0, 1, 101, 301, 1001, 3001, 10001];
      div.innerHTML = "<b>Légende</b><br>";
      for (let i = 0; i < grades.length; i++) {
        const from = grades[i];
        const to = grades[i + 1] ? grades[i + 1] - 1 : null;
        const label = (i === 0)
          ? "0"
          : (to === null)
            ? `≥ ${from.toLocaleString("fr-FR")}`
            : `${from.toLocaleString("fr-FR")}–${to.toLocaleString("fr-FR")}`;

        div.innerHTML += `<div><i style="background:${getColor(from)}"></i>${label}</div>`;
      }
      return div;
    };
    legend.addTo(map);

    // 7) Charger le GeoJSON des départements (votre fichier du repo)
    const DEPT_URL = "departements.geojson?v=2";

    fetch(DEPT_URL)
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status + " sur " + DEPT_URL);
        return r.json();
      })
      .then(geo => {
        console.log("[departements] type:", geo.type);
        console.log("[departements] features:", geo.features?.length);

        geoLayer = L.geoJSON(geo, { style, onEachFeature }).addTo(map);

        const bounds = geoLayer.getBounds();
        console.log("[departements] bounds valid:", bounds.isValid());

        if (bounds.isValid()) map.fitBounds(bounds);
      })
      .catch(err => console.error("Erreur chargement départements:", err));
  </script>
</body>
</html>
