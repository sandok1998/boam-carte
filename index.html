  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 1) Vos chiffres AO par département (votre tableau)
    const ao = {
      "33": 23265,

      "10": 2,

      // Cas spéciaux (DOM/TOM + Corse)
      "20A": 13,
      "20B": 12,
      "971": 17,
      "972": 16,
      "973": 11,
      "974": 17,
      "976": 6,
      "987": 4,
      "988": 6
    };

    // 2) Carte
    const map = L.map("map").setView([46.6, 2.5], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    // 3) Boîte d’info
    const info = L.control({ position: "topright" });
    info.onAdd = function() {
      this._div = L.DomUtil.create("div", "info");
      this.update();
      return this._div;
    };
    info.update = function(props) {
      if (!props) {
        this._div.innerHTML = "<b>AO par département</b><br>Survolez un département";
        return;
      }
      const code = props.code;
      const nom = props.nom;
      const n = ao[code] || 0;
      this._div.innerHTML = `<b>${nom} (${code})</b><br>${n.toLocaleString("fr-FR")} appels d’offres`;
    };
    info.addTo(map);

    // 4) Couleurs
    function getColor(n) {
      return n > 10000 ? "#800026" :
             n > 3000  ? "#BD0026" :
             n > 1000  ? "#E31A1C" :
             n > 300   ? "#FC4E2A" :
             n > 100   ? "#FD8D3C" :
             n > 0     ? "#FEB24C" :
                         "#EEE";
    }

    function style(feature) {
      const code = feature.properties.code;
      const n = ao[code] || 0;
      return {
        weight: 1,
        color: "#333",
        fillOpacity: 0.7,
        fillColor: getColor(n)
      };
    }

    // 5) Interactions
    let geoLayer;

    function highlight(e) {
      const layer = e.target;
      layer.setStyle({ weight: 2, color: "#000", fillOpacity: 0.85 });
      layer.bringToFront();
      info.update(layer.feature.properties);
    }

    function reset(e) {
      geoLayer.resetStyle(e.target);
      info.update();
    }

    function onEachFeature(feature, layer) {
      layer.on({
        mouseover: highlight,
        mouseout: reset
      });

      const code = feature.properties.code;
      const nom = feature.properties.nom;
      const n = ao[code] || 0;
      layer.bindTooltip(`${nom} (${code}) : ${n.toLocaleString("fr-FR")}`, { sticky: true });
    }

    // 6) Charger les départements
    fetch("departements.geojson?v=1")
      .then(r => {
        if (!r.ok) throw new Error("departements.geojson introuvable");
        return r.json();
      })
      .then(geo => {
        geoLayer = L.geoJSON(geo, { style, onEachFeature }).addTo(map);
        map.fitBounds(geoLayer.getBounds());
      })
      .catch(err => console.error(err));
  </script>
</body>

  .then(r => r.json())
  .then(data => {
    console.log("BOAMP sample item:", data.results?.[0]);
    console.log("BOAMP keys:", data.results?.[0] ? Object.keys(data.results[0]) : []);
  });

        let plotted = 0;

        results.forEach(item => {
          // Opendatasoft renvoie parfois geo_point_2d sous différentes formes
          const gp = item.geo_point_2d;

          if (!gp) return;

          const lat = gp.lat ?? gp.latitude ?? (Array.isArray(gp) ? gp[0] : null);
          const lon = gp.lon ?? gp.longitude ?? (Array.isArray(gp) ? gp[1] : null);

          if (typeof lat !== "number" || typeof lon !== "number") return;

          const objet = item.objet || "Sans titre";
          const acheteur = item.acheteur || "Non renseigné";
          const datePub = item.date_publication || "Date inconnue";

          L.marker([lat, lon]).addTo(layerBoamp)
            .bindPopup(`

    // Petite sécurité: éviter l’injection dans les popups
    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));

<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Carte interactive des appels d'offres BOAMP</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    header {
      padding: 12px 18px;
      background: #1f2933;
      color: white;
      font-size: 20px;
    }
    #map {
      height: calc(100vh - 50px);
      width: 100%;
    }
  </style>
</head>

<body>

<header>
  Carte des appels d'offres BOAMP (prototype)
</header>

<div id="map"></div>

<script>
  // Initialisation de la carte centrée sur la France
  const map = L.map('map').setView([46.5, 2.5], 6);

  // Fond de carte OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Appel API BOAMP (50 premiers résultats)
  fetch("https://boamp-datadila.opendatasoft.com/api/explore/v2.1/catalog/datasets/boamp/records?limit=50")
    .then(response => response.json())
    .then(data => {
      data.results.forEach(item => {
        if (item.geo_point_2d) {
          const lat = item.geo_point_2d.lat;
          const lon = item.geo_point_2d.lon;

          const objet = item.objet || "Sans titre";
          const acheteur = item.acheteur || "Non renseigné";
          const datePub = item.date_publication || "Date inconnue";
          const url = item.url || "#";

          L.marker([lat, lon]).addTo(map)
            .bindPopup(`
              <b>${objet}</b><br>
              Acheteur : ${acheteur}<br>
              Publié le : ${datePub}<br>
              <a href="${url}" target="_blank">Voir l'avis</a>
            `);
        }
      });
    })
    .catch(error => {
      console.error("Erreur lors de l'appel à l'API BOAMP :", error);
    });
</script>

</body>
